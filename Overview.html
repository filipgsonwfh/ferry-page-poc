<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stena Scandinavica · Gothenburg–Kiel</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="icon" href="assets/StenaFlag.svg" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: #fff; }
</style>
</head>
<body data-screen-label="Scandinavica overview">
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="germanica-data.jsx"></script>
<script type="text/babel" src="germanica-shell.jsx"></script>
<script type="text/babel" src="germanica-product-tile.jsx"></script>
<script type="text/babel" src="germanica-hub-sections.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function App() {
  const { lang, setLang } = useLang();
  useEffect(() => { setTimeout(() => lucide.createIcons(), 0); });

  // Voyage rhythm narrative
  const VOYAGE = {
    en: {
      eyebrow: 'A NIGHT AT SEA',
      title: 'The crossing, hour by hour.',
      lead: '14 hours and 30 minutes — long enough to actually arrive somewhere different.',
      moments: [
        { time: '18:45', title: 'Departure from Gothenburg', body: 'Boarding closes at 17:45. Drop the car, find your cabin, head up to deck for the harbour exit and a first drink.', icon: 'ship' },
        { time: '20:00', title: 'Dinner is served', body: 'The buffet opens at 18:30, à la carte at 19:00. Pre-book the window seats.', icon: 'utensils' },
        { time: '22:30', title: 'Bar, cinema, or cabin', body: 'Live music in Sky Bar. Late screening in the cinema. Or a hot shower and the gentle hum of the engine.', icon: 'wine' },
        { time: '07:00', title: 'Breakfast as the coast appears', body: 'Coffee, fresh bread, herring, eggs — and the German coastline through the window.', icon: 'coffee' },
        { time: '09:15', title: 'Arrival in Kiel', body: 'Hand keys back, drive off, hit the autobahn. You\'re already here.', icon: 'map-pin' },
      ],
    },
    sv: {
      eyebrow: 'EN NATT TILL SJÖSS',
      title: 'Överfarten, timme för timme.',
      lead: '14 timmar och 30 minuter — länge nog för att faktiskt komma fram någonstans nytt.',
      moments: [
        { time: '18:45', title: 'Avgång från Göteborg', body: 'Incheckning stänger 17:45. Lämna bilen, hitta hytten, upp på däck för hamninfart och en första drink.', icon: 'ship' },
        { time: '20:00', title: 'Middag är serverad', body: 'Buffén öppnar 18:30, à la carte 19:00. Förboka fönsterborden.', icon: 'utensils' },
        { time: '22:30', title: 'Bar, bio eller hytt', body: 'Live-musik i Sky Bar. Sen visning på bion. Eller en varm dusch och motorns mjuka brus.', icon: 'wine' },
        { time: '07:00', title: 'Frukost när kusten dyker upp', body: 'Kaffe, nybakat bröd, sill, ägg — och tyska kusten genom fönstret.', icon: 'coffee' },
        { time: '09:15', title: 'Ankomst Kiel', body: 'Lämna nyckeln, kör av, ut på autobahn. Du är redan framme.', icon: 'map-pin' },
      ],
    },
  };
  const v = VOYAGE[lang];

  return (
    <>
      <GermHeader active="overview" lang={lang} setLang={setLang}/>
      <GermHero lang={lang}/>
      <FacilitiesGrid lang={lang}/>
      <DiningTeaser lang={lang}/>

      {/* Voyage timeline */}
      <section style={{ padding: '72px 32px', background: '#fff', borderTop: `1px solid ${STENA.ui300}` }} data-screen-label="Voyage timeline">
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <h2 style={{ fontSize: 32, fontWeight: 700, color: STENA.ui900, margin: '0 0 8px', lineHeight: 1.15, letterSpacing: '-.005em' }}>{v.title}</h2>
          <p style={{ fontSize: 16, color: STENA.ui700, margin: '0 0 40px', maxWidth: 620, lineHeight: 1.55 }}>{v.lead}</p>
          <ol style={{ listStyle: 'none', padding: 0, margin: 0 }}>
            {v.moments.map((m, i) => (
              <li key={i} style={{
                display: 'grid', gridTemplateColumns: '110px 48px 1fr', alignItems: 'flex-start', gap: 24,
                padding: '20px 0', borderTop: i === 0 ? 'none' : `1px solid ${STENA.ui300}`,
              }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: STENA.coreBlue, fontVariantNumeric: 'tabular-nums', lineHeight: 1.2 }}>{m.time}</div>
                <div style={{
                  width: 40, height: 40, borderRadius: 9999, background: STENA.himmelLighter,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none',
                }}>
                  <i data-lucide={m.icon} style={{ width: 18, height: 18, color: STENA.coreBlue }}></i>
                </div>
                <div>
                  <h3 style={{ fontSize: 17, fontWeight: 600, color: STENA.ui900, margin: '0 0 4px' }}>{m.title}</h3>
                  <p style={{ fontSize: 14, color: STENA.ui700, margin: 0, lineHeight: 1.55, maxWidth: 720, textWrap: 'pretty' }}>{m.body}</p>
                </div>
              </li>
            ))}
          </ol>
        </div>
      </section>

      <ShopTeaser lang={lang}/>

      {/* Vessel facts strip — Scandinavica only */}
      <section style={{ padding: '64px 32px', background: STENA.molnigare }} data-screen-label="Vessel facts">
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 12, letterSpacing: '.16em', fontWeight: 700, color: STENA.coreBlue, marginBottom: 10 }}>
              {lang === 'sv' ? 'OM FARTYGET' : 'ABOUT THE VESSEL'}
            </div>
            <h2 style={{ fontFamily: STENA.fontHeading, fontSize: 32, fontWeight: 700, color: STENA.ui900, margin: 0, lineHeight: 1.15, letterSpacing: '-.005em' }}>
              {lang === 'sv' ? 'Stena Scandinavica' : 'Stena Scandinavica'}
            </h2>
          </div>
          {(() => {
            const v = FERRY.vessels.find(x => x.id === 'scandinavica') || FERRY.vessels[0];
            return (
              <div style={{ background: '#fff', borderRadius: 12, padding: 36, border: `1px solid ${STENA.ui300}` }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 40, alignItems: 'center' }}>
                  <div>
                    <h3 style={{ fontSize: 28, fontWeight: 700, color: STENA.coreBlue, margin: '0 0 6px' }}>{v.name}</h3>
                    <div style={{ fontSize: 14, color: STENA.ui600, marginBottom: 18 }}>
                      {lang === 'sv' ? `Byggt ${v.built}` : `Built ${v.built}`} · {v.length} m · Gothenburg → Kiel
                    </div>
                    <p style={{ fontSize: 15, color: STENA.ui700, margin: 0, lineHeight: 1.55, maxWidth: 560 }}>
                      {lang === 'sv'
                        ? 'En av Östersjöns största passagerarfärjor — bred, stabil och byggd för komfort under en hel överfart.'
                        : 'One of the Baltic\u2019s largest passenger ferries — broad, stable, built for comfort across a full crossing.'}
                    </p>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
                    <Fact label={lang === 'sv' ? 'Passagerare' : 'Passengers'} value={v.capacity.pax}/>
                    <Fact label={lang === 'sv' ? 'Bilar' : 'Cars'} value={v.capacity.cars}/>
                    <Fact label={lang === 'sv' ? 'Lastmeter' : 'Lane metres'} value={v.capacity.freight}/>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </section>

      <GermFooter lang={lang}/>
    </>
  );
}

function Fact({ label, value }) {
  return (
    <div>
      <div style={{ fontSize: 28, fontWeight: 700, color: STENA.ui900, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{value.toLocaleString()}</div>
      <div style={{ fontSize: 12, color: STENA.ui600, marginTop: 4, textTransform: 'uppercase', letterSpacing: '.04em', fontWeight: 500 }}>{label}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
