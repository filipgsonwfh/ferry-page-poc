<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Food &amp; dining · Stena Scandinavica</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="icon" href="assets/StenaFlag.svg" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: #fff; }
  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-thumb { background: #c5c8cb; border-radius: 99px; }
</style>
</head>
<body data-screen-label="Food & dining">
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="germanica-data.jsx"></script>
<script type="text/babel" src="germanica-shell.jsx"></script>
<script type="text/babel" src="food-menu-data.jsx"></script>
<script type="text/babel" src="food-menu-components.jsx"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

function App() {
  const { lang, setLang } = useLang();
  const [cat, setCat] = useState('');
  const [venue, setVenue] = useState('');
  const [tag, setTag] = useState('');
  const [priceMax, setPriceMax] = useState(400);
  const [q, setQ] = useState('');
  const [sort, setSort] = useState('feat');
  const [open, setOpen] = useState(null);

  const gridRef = useRef(null);
  useEffect(() => { setTimeout(() => lucide.createIcons(), 0); });

  const filtered = useMemo(() => {
    let list = window.FOOD_MENU.slice();
    if (cat) list = list.filter(d => d.cat === cat);
    if (venue) list = list.filter(d => d.venue[lang] === venue);
    if (tag) list = list.filter(d => (d.tags || []).includes(tag));
    if (priceMax < 400) list = list.filter(d => d.price.sek <= priceMax);
    if (q.trim()) {
      const Q = q.trim().toLowerCase();
      list = list.filter(d =>
        d.name.en.toLowerCase().includes(Q) ||
        d.name.sv.toLowerCase().includes(Q) ||
        d.desc.en.toLowerCase().includes(Q) ||
        d.desc.sv.toLowerCase().includes(Q)
      );
    }
    if (sort === 'priceA') list.sort((a, b) => a.price.sek - b.price.sek);
    if (sort === 'priceD') list.sort((a, b) => b.price.sek - a.price.sek);
    if (sort === 'name')   list.sort((a, b) => a.name[lang].localeCompare(b.name[lang]));
    return list;
  }, [cat, venue, tag, priceMax, q, sort, lang]);

  const onPickVenue = (v) => {
    setVenue(v);
    setTimeout(() => {
      if (gridRef.current) {
        const top = gridRef.current.getBoundingClientRect().top + window.scrollY - 8;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }, 60);
  };

  const pills = [];
  if (cat) pills.push({ label: cat, on: () => setCat('') });
  if (venue) pills.push({ label: venue, on: () => setVenue('') });
  if (tag) pills.push({ label: tag, on: () => setTag('') });
  if (q) pills.push({ label: `"${q}"`, on: () => setQ('') });

  return (
    <>
      <GermHeader active="dining" lang={lang} setLang={setLang}/>
      <FoodHeroV2 lang={lang}/>
      <RestaurantPicker lang={lang} onPick={onPickVenue} active={venue}/>

      <section ref={gridRef} style={{ padding: '24px 32px 96px', background: STENA.molnigare, borderTop: `1px solid ${STENA.ui300}` }} data-screen-label="Full menu">
        <div style={{ maxWidth: 1280, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '36px 0 24px', flexWrap: 'wrap', gap: 16 }}>
            <div>
              <h2 style={{ fontFamily: STENA.fontHeading, fontSize: 36, fontWeight: 700, letterSpacing: '-.012em', color: STENA.ui900, margin: '0 0 6px' }}>
                {lang === 'sv' ? 'Hela menyn' : 'The full menu'}
              </h2>
              <p style={{ fontSize: 15, color: STENA.ui700, margin: 0 }}>
                {lang === 'sv'
                  ? `Visar ${filtered.length} av ${window.FOOD_MENU.length} rätter ombord på Stena Scandinavica.`
                  : `Showing ${filtered.length} of ${window.FOOD_MENU.length} dishes served on board Stena Scandinavica.`}
              </p>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 24, alignItems: 'flex-start' }}>
            <MenuFilters lang={lang} cat={cat} setCat={setCat} venue={venue} setVenue={setVenue} tag={tag} setTag={setTag} priceMax={priceMax} setPriceMax={setPriceMax}/>

            <div>
              <MenuToolbar lang={lang} q={q} setQ={setQ} sort={sort} setSort={setSort}/>

              {pills.length > 0 && (
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 18 }}>
                  {pills.map((p, i) => (
                    <button key={i} onClick={p.on} style={{
                      display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 10px 6px 14px',
                      borderRadius: 9999, background: STENA.coreBlue, color: '#fff',
                      border: 'none', fontSize: 12, fontFamily: 'inherit', fontWeight: 500, textTransform: 'capitalize', cursor: 'pointer',
                    }}>
                      {p.label}<i data-lucide="x" style={{ width: 12, height: 12 }}></i>
                    </button>
                  ))}
                </div>
              )}

              {filtered.length === 0 ? (
                <div style={{ padding: 48, textAlign: 'center', background: '#fff', border: `1px dashed ${STENA.ui400}`, borderRadius: 12 }}>
                  <i data-lucide="search-x" style={{ width: 40, height: 40, color: STENA.ui600 }}></i>
                  <h3 style={{ fontSize: 18, fontWeight: 700, color: STENA.ui900, margin: '12px 0 6px' }}>
                    {lang === 'sv' ? 'Inga rätter hittade' : 'No dishes found'}
                  </h3>
                  <p style={{ fontSize: 14, color: STENA.ui700, margin: '0 0 18px' }}>
                    {lang === 'sv' ? 'Prova att ändra eller rensa dina filter.' : 'Try changing or clearing your filters.'}
                  </p>
                  <button onClick={() => { setCat(''); setVenue(''); setTag(''); setQ(''); setPriceMax(400); }} style={{
                    padding: '10px 20px', borderRadius: 9999, background: STENA.coreBlue, color: '#fff',
                    border: 'none', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
                  }}>{lang === 'sv' ? 'Rensa filter' : 'Clear filters'}</button>
                </div>
              ) : (
                cat || venue || tag || q || priceMax < 400 ? (
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
                    {filtered.map(d => <DishCard key={d.id} d={d} lang={lang} onOpen={setOpen}/>)}
                  </div>
                ) : (
                  // Group by category
                  ['mains', 'sides', 'kids', 'desserts', 'breakfast', 'beverages'].map(c => {
                    const items = filtered.filter(d => d.cat === c);
                    if (items.length === 0) return null;
                    const titles = {
                      en: { mains: 'Main courses', sides: 'Side dishes', kids: "Kids' menu", desserts: 'Desserts', breakfast: 'Breakfast', beverages: 'Beverages' },
                      sv: { mains: 'Huvudrätter', sides: 'Tillbehör', kids: 'Barnmeny', desserts: 'Efterrätter', breakfast: 'Frukost', beverages: 'Drycker' },
                    };
                    return (
                      <section key={c} style={{ marginBottom: 48 }} data-screen-label={`Section ${c}`}>
                        <h3 style={{ fontFamily: STENA.fontHeading, fontSize: 28, fontWeight: 700, color: STENA.ui900, margin: '0 0 18px', letterSpacing: '-.005em' }}>
                          {titles[lang][c]}
                        </h3>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
                          {items.map(d => <DishCard key={d.id} d={d} lang={lang} onOpen={setOpen}/>)}
                        </div>
                      </section>
                    );
                  })
                )
              )}
            </div>
          </div>
        </div>
      </section>

      <GermFooter lang={lang}/>
      <DishDialog d={open} lang={lang} onClose={() => setOpen(null)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
